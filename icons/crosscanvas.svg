    <rect x="27.5" y="18.5" width="9" height="8" rx="1.5" stroke="#8f6a38"/>
    <rect x="40.5" y="18.5" width="9" height="8" rx="1.5" stroke="#c49b5f"/>
    <rect x="14.5" y="31.5" width="9" height="8" rx="1.5" stroke="#8f6a38"/>
    <rect x="27.5" y="31.5" width="9" height="8" rx="1.5" stroke="#c49b5f"/>
    <rect x="40.5" y="31.5" width="9" height="8" rx="1.5" stroke="#8f6a38"/>
